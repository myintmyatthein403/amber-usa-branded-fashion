version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: amber_postgres
    environment:
      POSTGRES_USER: prisma
      POSTGRES_PASSWORD: topsecretpassword
      POSTGRES_DB: amber_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U prisma -d amber_db']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres_test:
    image: postgres:15
    container_name: amber_postgres_test
    environment:
      POSTGRES_USER: prisma
      POSTGRES_PASSWORD: topsecretpassword
      POSTGRES_DB: amber_test
    ports:
      - '5433:5432'
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    restart: on-failure
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U prisma -d amber_test']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  postgres_test_data: